<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      padding: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.1);
      opacity: 0.8;
    }

    .gallery-item:hover .caption {
      opacity: 1;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="gallery">
    <div class="gallery-item">
      <img src="https://picsum.photos/id/1015/600/400" alt="" />
      <div class="caption">Mountain View</div>
    </div>

    <div class="gallery-item">
      <img src="https://picsum.photos/id/1025/600/400" alt="" />
      <div class="caption">Cute Puppy</div>
    </div>

    <div class="gallery-item">
      <img src="https://picsum.photos/id/1035/600/400" alt="" />
      <div class="caption">Forest Path</div>
    </div>

    <div class="gallery-item">
      <img src="https://picsum.photos/id/1045/600/400" alt="" />
      <div class="caption">Beach Sunset</div>
    </div>

    <div class="gallery-item">
      <img src="https://picsum.photos/id/1055/600/400" alt="" />
      <div class="caption">City Lights</div>
    </div>

    <div class="gallery-item">
      <img src="https://picsum.photos/id/1065/600/400" alt="" />
      <div class="caption">Desert Dunes</div>
    </div>
  </div>

</body>
</html>
